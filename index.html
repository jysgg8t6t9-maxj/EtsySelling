<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Budget</title>
<meta name="description" content="Your private personal budgeting app.">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2313624A'/><path d='M30 62 L45 47 L56 56 L72 38' stroke='white' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body>

<!-- Optional passcode lock (set in Settings). Hidden unless a passcode exists. -->
<div id="lock" class="lock" hidden>
  <div class="lock-card">
    <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 16l4-4 3 3 6-7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2 id="lockTitle">Welcome back</h2>
    <p>Enter your passcode to open your budget.</p>
    <input id="lockInput" type="password" inputmode="numeric" placeholder="••••" autocomplete="off" maxlength="12">
    <button class="btn" id="lockBtn">Unlock</button>
    <div class="hint">Private to this device. Forgot it? See the guide to reset.</div>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 16l4-4 3 3 6-7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="brand-name" id="brandName">My Budget<span id="brandTag">your money, in focus</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      Saved privately on this device.<br>Back up your data in Settings.
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <h1 class="view-title" id="viewTitle">Dashboard</h1>
      <div class="month-nav" id="monthNav">
        <button id="prevMonth" aria-label="Previous month"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <span class="month-label num" id="monthLabel">—</span>
        <button id="nextMonth" aria-label="Next month"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
      <button class="btn btn-accent desktop-add" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        Add transaction
      </button>
    </header>
    <div class="content" id="view"></div>
  </main>
</div>

<!-- Mobile nav + FAB -->
<nav class="mobile-bar" id="mobileBar"></nav>
<button class="fab" id="fab" aria-label="Add transaction"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></button>

<div id="modalRoot"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="app.js"></script>
</body>
</html>
